<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Handy Load Probe</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
      line-height: 1.6;
    }
    .ok { color: #0b8043; font-weight: bold; }
    .ng { color: #b31412; font-weight: bold; }
    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Handy Load Probe</h1>
  <p class="ok">HTML表示完了</p>
  <pre id="log"></pre>

  <script>
    const log = [];
    function add(message) {
      log.push(new Date().toLocaleTimeString("ja-JP") + " " + message);
      document.getElementById("log").textContent = log.join("\n");
    }

    add("DOMContentLoaded待機前");

    window.addEventListener("DOMContentLoaded", function() {
      add("DOMContentLoaded発火");
      add("location.href=" + location.href);
      add("userAgent=" + navigator.userAgent);
      add("online=" + navigator.onLine);
      add("localStorage test start");

      try {
        localStorage.setItem("handy_probe_test", String(Date.now()));
        add("localStorage OK: " + localStorage.getItem("handy_probe_test"));
      } catch (error) {
        add("localStorage ERROR: " + error.message);
      }

      add("probe完了");
    });

    window.addEventListener("error", function(event) {
      add("JS ERROR: " + event.message);
    });

    window.addEventListener("unhandledrejection", function(event) {
      add("PROMISE ERROR: " + (event.reason && event.reason.message ? event.reason.message : String(event.reason)));
    });
  </script>
</body>
</html>
